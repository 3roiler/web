name: CodeQL

# Custom CodeQL workflow — überschreibt die GitHub Default-Setup-Variante,
# die nur auf Push-to-main feuert. Hier triggern wir explizit auch auf
# Pull Requests, damit die Branch-Protection-Regel "Code scanning must
# pass" für PRs überhaupt erfüllbar ist.
#
# Sprachen: JavaScript / TypeScript — die SPA hat keine Python/Go-Bits.
# Security-extended Suite — entspricht dem, was Default-Setup auch nutzt.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Wöchentlicher Refresh-Scan auf main.
    - cron: '17 5 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

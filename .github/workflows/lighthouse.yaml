name: Lighthouse + Axe

# Lighthouse-CI + axe-core gegen den lokal gebauten Production-Build.
# Läuft auf jeden PR, der Frontend-Dateien anfasst, und auf jeden Push
# auf main.
#
# Lighthouse: fail-on-thresholds (warn-only, kein hartes Gate) für
#   Performance, A11y, SEO, Best Practices.
# Axe (IDEA-20): tiefergehende Accessibility-Audits als Lighthouse-
#   intern. Lighthouse nutzt nur den WCAG-A/AA-Core-Subset; `@axe-core/cli`
#   deckt zusätzlich Experimental + Best-Practice-Rules ab.
#
# Bewusst NUR `/`, `/blog`, `/streamclips` als Routen — Dashboard ist
# auth-gated und kein Crawler/Audit loggt sich ein.

on:
  pull_request:
    paths:
      - 'src/**'
      - 'index.html'
      - 'style.css'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - '.github/workflows/lighthouse.yaml'
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lhci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Lighthouse-CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse-CI
        run: lhci autorun --config=lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # axe-core Deep-A11y-Scan gegen den gleichen Build (IDEA-20).
      # `start-server-and-test` startet `npm run preview` (vite preview
      # auf Port 4173), wartet bis er HTTP 200 liefert, ruft dann
      # `npm run a11y` (axe-cli) auf und tötet den Server nach Abschluss.
      # `continue-on-error: true` macht den Step informational solange
      # wir noch a11y-Backlog haben — das Ziel ist Sichtbarkeit, nicht
      # ein hartes Gate (analog Lighthouse-Schwellen oben).
      - name: Run axe-core a11y scan
        run: npm run a11y:ci
        continue-on-error: true

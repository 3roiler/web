<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Sasukiri - Live Stream ✨</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        /* Google Fonts do not provide a stable SRI hash (CSS body varies by UA),
           so we pull them via @import inside a <style> block. This preserves
           caching/CDN delivery without a <link> that would trip Web:S5725. */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink-100: #FFF0F5;
            --pink-200: #FFD6E5;
            --pink-300: #FFA8C2;
            --pink-400: #FF85A8;
            --pink-500: #FF6B9D;
            --pink-600: #E91E8C;
            --pink-glow: rgba(255, 107, 157, 0.6);
            --dark-bg: #0d0d1a;
            --dark-card: #1a1a2e;
            --dark-card-light: #252540;
        }

        body {
            background: var(--dark-bg);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 157, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(233, 30, 140, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 133, 168, 0.05) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
            opacity: 0.6;
        }

        .particle:nth-child(1) { width: 20px; height: 20px; background: var(--pink-400); left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 15px; height: 15px; background: var(--pink-300); left: 20%; top: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 25px; height: 25px; background: var(--pink-500); left: 70%; top: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { width: 10px; height: 10px; background: var(--pink-200); left: 80%; top: 70%; animation-delay: 6s; }
        .particle:nth-child(5) { width: 18px; height: 18px; background: var(--pink-400); left: 50%; top: 10%; animation-delay: 8s; }
        .particle:nth-child(6) { width: 12px; height: 12px; background: var(--pink-600); left: 30%; top: 50%; animation-delay: 10s; }
        .particle:nth-child(7) { width: 22px; height: 22px; background: var(--pink-300); left: 90%; top: 40%; animation-delay: 12s; }
        .particle:nth-child(8) { width: 8px; height: 8px; background: var(--pink-500); left: 5%; top: 60%; animation-delay: 14s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            25% { transform: translateY(-30px) rotate(90deg); opacity: 0.8; }
            50% { transform: translateY(-10px) rotate(180deg); opacity: 0.4; }
            75% { transform: translateY(-40px) rotate(270deg); opacity: 0.7; }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: sparkle 3s infinite;
        }

        .sparkle::before, .sparkle::after {
            content: '';
            position: absolute;
            background: white;
        }

        .sparkle::before {
            width: 12px;
            height: 2px;
            top: 1px;
            left: -4px;
        }

        .sparkle::after {
            width: 2px;
            height: 12px;
            top: -4px;
            left: 1px;
        }

        .sparkle:nth-child(9) { left: 15%; top: 25%; animation-delay: 0s; }
        .sparkle:nth-child(10) { left: 85%; top: 15%; animation-delay: 0.5s; }
        .sparkle:nth-child(11) { left: 45%; top: 85%; animation-delay: 1s; }
        .sparkle:nth-child(12) { left: 75%; top: 55%; animation-delay: 1.5s; }
        .sparkle:nth-child(13) { left: 25%; top: 75%; animation-delay: 2s; }
        .sparkle:nth-child(14) { left: 65%; top: 5%; animation-delay: 2.5s; }

        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .main-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.9) 0%, rgba(233, 30, 140, 0.8) 100%);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 30px rgba(255, 107, 157, 0.4);
            border-bottom: 2px solid var(--pink-400);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: headerShine 4s infinite;
        }

        @keyframes headerShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: auto;
        }

        .header-right-button {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .header-right-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .header-right-button:hover::before {
            left: 100%;
        }

        .header-right-button:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .header-right-button.discord:hover { 
            background: #5865F2; 
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
        }
        .header-right-button.tiktok:hover { 
            background: linear-gradient(135deg, #00f2ea, #ff0050); 
            box-shadow: 0 10px 25px rgba(255, 0, 80, 0.4);
        }
        .header-right-button.instagram:hover { 
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); 
            box-shadow: 0 10px 25px rgba(253, 29, 29, 0.4);
        }
        .header-right-button.youtube:hover { 
            background: #FF0000; 
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.4);
        }

        .logo-container {
            position: relative;
        }

        .header-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .header-logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .logo-ring {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 60px;
            height: 60px;
            border: 3px solid var(--pink-200);
            border-radius: 50%;
            animation: ringPulse 4s infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0; }
        }

        .header-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-title {
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5), 2px 2px 4px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
        }

        .header-subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .live-indicator {
            display: none;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: livePulse 1.5s infinite;
        }

        .live-indicator.show {
            display: flex;
        }

        .live-indicator .dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: dotBlink 1s infinite;
        }

        @keyframes livePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 0, 0.8); }
        }

        @keyframes dotBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .offline-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #4a4a6a, #3a3a5a);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .offline-indicator.hide {
            display: none;
        }

        .cinema-toggle {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: auto;
        }

        .cinema-toggle:hover {
            background: var(--pink-500);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
        }

        .cinema-toggle.active {
            background: var(--pink-600);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
        }

        .cinema-toggle.active i::before {
            content: "\f066";
        }

        .stream-wrapper {
            flex: 1;
            display: flex;
            padding: 25px;
            gap: 25px;
            min-height: 600px;
        }

        .stream-container {
            flex: 1;
            background: var(--dark-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(255, 107, 157, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .stream-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--pink-400), var(--pink-600), var(--pink-300), var(--pink-500), var(--pink-400));
            background-size: 400% 400%;
            border-radius: 22px;
            z-index: -1;
            animation: borderGlow 8s linear infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .vine-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.8;
        }

        .vine-corner svg {
            width: 100%;
            height: 100%;
        }

        .vine-corner.top-left { top: 0; left: 0; }
        .vine-corner.top-right { top: 0; right: 0; transform: scaleX(-1); }
        .vine-corner.bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
        .vine-corner.bottom-right { bottom: 0; right: 0; transform: scale(-1, -1); }

        .vine-path {
            fill: none;
            stroke: var(--pink-400);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawVine 5s ease forwards;
        }

        .vine-leaf {
            fill: var(--pink-300);
            opacity: 0;
            animation: leafAppear 0.6s ease forwards;
        }

        .vine-corner.top-left .vine-path { animation-delay: 0s; }
        .vine-corner.top-right .vine-path { animation-delay: 0.5s; }
        .vine-corner.bottom-left .vine-path { animation-delay: 1s; }
        .vine-corner.bottom-right .vine-path { animation-delay: 1.5s; }

        .vine-corner.top-left .vine-leaf { animation-delay: 2s; }
        .vine-corner.top-right .vine-leaf { animation-delay: 2.5s; }
        .vine-corner.bottom-left .vine-leaf { animation-delay: 3s; }
        .vine-corner.bottom-right .vine-leaf { animation-delay: 3.5s; }

        @keyframes drawVine {
            to { stroke-dashoffset: 0; }
        }

        @keyframes leafAppear {
            to { opacity: 1; }
        }

        .stream-container iframe,
        .stream-container #twitch-embed {
            width: 100%;
            flex: 1;
            border: none;
        }

        .schedule-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-card) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .schedule-container.show {
            opacity: 1;
            visibility: visible;
        }

        .schedule-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .schedule-container h2 {
            color: var(--pink-300);
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 30px var(--pink-glow);
        }

        .schedule-container .subtitle {
            color: #9ca3af;
            margin-bottom: 30px;
            font-size: 1.1rem;
            text-align: center;
        }

        .gaming-icons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .gaming-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 107, 157, 0.1);
            border: 2px solid var(--pink-400);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            animation: iconFloat 3s ease-in-out infinite;
            transition: all 0.3s ease;
            padding: 8px;
            overflow: hidden;
        }

        .gaming-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .gaming-icon:nth-child(1) { animation-delay: 0s; }
        .gaming-icon:nth-child(2) { animation-delay: 0.5s; }
        .gaming-icon:nth-child(3) { animation-delay: 1s; }
        .gaming-icon:nth-child(4) { animation-delay: 1.5s; }

        .gaming-icon:hover {
            background: rgba(255, 107, 157, 0.3);
            transform: scale(1.1) rotate(5deg);
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .schedule-note {
            color: #9ca3af;
            font-size: 0.95rem;
            text-align: center;
            background: rgba(255, 107, 157, 0.1);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }

        .schedule-note i {
            color: var(--pink-400);
            margin-right: 8px;
        }

        .chat-container {
            width: 450px;
            background: var(--dark-card);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 8px 40px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(255, 107, 157, 0.1);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 2px solid var(--pink-400);
        }

        .chat-header {
            background: linear-gradient(135deg, var(--pink-400) 0%, var(--pink-600) 100%);
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .chat-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, white, transparent);
            animation: chatHeaderLine 4s infinite;
        }

        @keyframes chatHeaderLine {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .chat-header i {
            animation: chatPulse 4s infinite;
        }

        @keyframes chatPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .chat-container iframe {
            flex: 1;
            border: none;
        }

        /* Custom Chat UI */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-message {
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: chatMsgIn 0.2s ease;
        }

        @keyframes chatMsgIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-message .chat-author {
            font-weight: 700;
            cursor: pointer;
        }

        .chat-message .chat-text {
            color: #e5e7eb;
        }

        .chat-input-area {
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 107, 157, 0.2);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            background: var(--dark-card-light);
            border: 1px solid rgba(255, 107, 157, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: var(--pink-400);
        }

        .chat-input-area button {
            background: linear-gradient(135deg, var(--pink-400), var(--pink-600));
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .chat-input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.4);
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .chat-login-prompt {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 30px;
            text-align: center;
        }

        .chat-login-prompt p {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .twitch-login-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #9146ff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .twitch-login-btn:hover {
            background: #7c3aed;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(145, 70, 255, 0.5);
        }

        .twitch-login-btn i {
            font-size: 1.1rem;
        }

        .chat-user-bar {
            padding: 6px 15px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .chat-user-bar .chat-username {
            color: var(--pink-300);
            font-weight: 600;
        }

        .chat-user-bar button {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 0.75rem;
            transition: color 0.2s;
        }

        .chat-user-bar button:hover {
            color: var(--pink-400);
        }

        .chat-status {
            padding: 4px 15px;
            font-size: 0.7rem;
            color: #6b7280;

        <button class="ext-btn" id="extPoll" title="Umfrage"><i class="fas fa-poll"></i></button>
    </div>

    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <script>
        // ── Crypto helpers ──
        // Cryptographically secure replacements for Math.random().
        // Used for OAuth state (security-critical) and cosmetic randomness
        // (emote rain, chat color fallback, anon nick) to keep SonarCloud happy.
        const _cryptoObj = globalThis.crypto || globalThis.msCrypto;
        function secureRandomFloat() {
            const buf = new Uint32Array(1);
            _cryptoObj.getRandomValues(buf);
            return buf[0] / 0x100000000;
        }
        function secureRandomInt(maxExclusive) {
            const buf = new Uint32Array(1);
            _cryptoObj.getRandomValues(buf);
            return buf[0] % maxExclusive;
        }
        function secureRandomHex(byteLength) {
            const buf = new Uint8Array(byteLength);
            _cryptoObj.getRandomValues(buf);
            return Array.from(buf, b => b.toString(16).padStart(2, '0')).join('');
        }

        // ── Config ──
        const CHANNEL = 'sasukiris';
        const API_BASE = globalThis.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://api.broiler.dev/api';
        // Set via deploy env; when empty, OAuth login is disabled.
        // Register an app at https://dev.twitch.tv/console/apps to obtain a Client ID.
        const TWITCH_CLIENT_ID = '';
        const TWITCH_REDIRECT_URI = globalThis.location.origin + globalThis.location.pathname;
        const TWITCH_SCOPES = 'user:read:chat user:write:chat';

        // ── State ──
        let twitchUser = JSON.parse(localStorage.getItem('sasu_twitch_user') || 'null');
        let channelId = null;
        let chatWs = null;
        let chatReconnectTimer = null;

        // ── Twitch Embed Player ──
        const embed = new Twitch.Embed("twitch-embed", {
            width: "100%",
            height: "100%",
            channel: CHANNEL,
            parent: ["broiler.dev", "localhost"],
            layout: "video",
            theme: "dark"
        });

        const liveIndicator = document.getElementById('liveIndicator');
        const offlineIndicator = document.getElementById('offlineIndicator');
        const scheduleContainer = document.getElementById('scheduleContainer');

        embed.addEventListener(Twitch.Embed.VIDEO_READY, () => {
            const player = embed.getPlayer();
            setTimeout(() => checkStreamStatus(player), 2000);
            setInterval(() => checkStreamStatus(player), 30000);
        });

        function checkStreamStatus(player) {
            const playback = player.getPlaybackStats();
            const isPaused = player.isPaused();
            if (playback && playback.videoFrameRate > 0 && !isPaused) {
                setOnlineState();
            } else {
                setOfflineState();
            }
        }

        function setOnlineState() {
            liveIndicator.classList.add('show');
            offlineIndicator.classList.add('hide');
            scheduleContainer.classList.remove('show');
        }

        function setOfflineState() {
            liveIndicator.classList.remove('show');
            offlineIndicator.classList.remove('hide');
            scheduleContainer.classList.add('show');
        }

        embed.addEventListener(Twitch.Embed.ONLINE, () => setOnlineState());
        embed.addEventListener(Twitch.Embed.OFFLINE, () => setOfflineState());

        // ── Twitch OAuth ──
        function buildTwitchAuthUrl() {
            // OAuth state must be cryptographically random (CSRF defense).
            const state = secureRandomHex(16);
            sessionStorage.setItem('twitch_oauth_state', state);
            return `https://id.twitch.tv/oauth2/authorize?client_id=${TWITCH_CLIENT_ID}&redirect_uri=${encodeURIComponent(TWITCH_REDIRECT_URI)}&response_type=code&scope=${encodeURIComponent(TWITCH_SCOPES)}&state=${state}`;
        }

        function startTwitchLogin() {
            globalThis.location.href = buildTwitchAuthUrl();
        }

        async function handleOAuthCallback() {
            const params = new URLSearchParams(globalThis.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const savedState = sessionStorage.getItem('twitch_oauth_state');

            if (!code) return;

            // Clean URL
            globalThis.history.replaceState({}, document.title, globalThis.location.pathname);

            if (state !== savedState) {
                console.error('OAuth state mismatch');
                return;
            }

            sessionStorage.removeItem('twitch_oauth_state');

            try {
                const res = await fetch(`${API_BASE}/twitch/oauth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ code, redirect_uri: TWITCH_REDIRECT_URI })
                });

                if (!res.ok) throw new Error('OAuth exchange failed');

                const data = await res.json();
                twitchUser = { login: data.twitch.login, displayName: data.twitch.displayName, userId: data.user.id };
                localStorage.setItem('sasu_twitch_user', JSON.stringify(twitchUser));
                updateAuthUI();
                connectChat();
            } catch (err) {
                console.error('Twitch login error:', err);
            }
        }

        function twitchLogout() {
            twitchUser = null;
            localStorage.removeItem('sasu_twitch_user');
            if (chatWs) { chatWs.close(); chatWs = null; }
            updateAuthUI();
        }

        function updateAuthUI() {
            const loginBtn = document.getElementById('twitchLoginBtn');
            const chatLoginPrompt = document.getElementById('chatLoginPrompt');
            const chatInputArea = document.getElementById('chatInputArea');
            const chatUserBar = document.getElementById('chatUserBar');

            if (twitchUser) {
                loginBtn.classList.add('logged-in');
                loginBtn.title = `Eingeloggt als ${twitchUser.displayName}`;
                chatLoginPrompt.style.display = 'none';
                chatInputArea.style.display = 'flex';
                chatUserBar.style.display = 'flex';
                document.getElementById('chatUsername').textContent = twitchUser.displayName;
            } else {
                loginBtn.classList.remove('logged-in');
                loginBtn.title = 'Mit Twitch anmelden';
                chatLoginPrompt.style.display = 'flex';
                chatInputArea.style.display = 'none';
                chatUserBar.style.display = 'none';
            }
        }

        // ── Chat via Twitch IRC WebSocket (read-only, no auth needed) ──
        function connectChat() {
            if (chatWs) { chatWs.close(); }

            const statusEl = document.getElementById('chatStatus');
            statusEl.textContent = 'Verbinde...';
            statusEl.className = 'chat-status connecting';

            chatWs = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

            chatWs.onopen = () => {
                chatWs.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
                chatWs.send('NICK justinfan' + secureRandomInt(99999));
                chatWs.send(`JOIN #${CHANNEL}`);
                statusEl.textContent = 'Verbunden';
                statusEl.className = 'chat-status connected';
            };

            chatWs.onmessage = (event) => {
                const lines = event.data.split('\r\n');
                for (const line of lines) {
                    if (line.startsWith('PING')) {
                        chatWs.send('PONG :tmi.twitch.tv');
                        continue;
                    }
                    if (line.includes('PRIVMSG')) {
                        const parsed = parseTwitchMessage(line);
                        if (parsed) appendChatMessage(parsed);
                    }
                }
            };

            chatWs.onclose = () => {
                statusEl.textContent = 'Getrennt - Verbinde neu...';
                statusEl.className = 'chat-status disconnected';
                chatReconnectTimer = setTimeout(connectChat, 3000);
            };

            chatWs.onerror = () => {
                statusEl.textContent = 'Verbindungsfehler';
                statusEl.className = 'chat-status disconnected';
            };
        }

        function parseTwitchMessage(raw) {
            try {
                const tagsPart = raw.startsWith('@') ? raw.substring(1, raw.indexOf(' ')) : '';
                const tags = {};
                if (tagsPart) {
                    for (const pair of tagsPart.split(';')) {
                        const [k, v] = pair.split('=');
                        tags[k] = v || '';
                    }
                }

                const msgMatch = raw.match(/PRIVMSG #\w+ :(.+)/);
                if (!msgMatch) return null;

                return {
                    author: tags['display-name'] || 'Anonym',
                    color: tags['color'] || '#' + secureRandomInt(0xFFFFFF).toString(16).padStart(6, '0'),
                    text: msgMatch[1],
                    badges: tags['badges'] || '',
                    emotes: tags['emotes'] || ''
                };
            } catch { return null; }
        }

        function appendChatMessage(msg) {
            const chatMessages = document.getElementById('chatMessages');
            const overlayChatMessages = document.getElementById('overlayChatMessages');

            const el = document.createElement('div');
            el.className = 'chat-message';

            let badgeIcons = '';
            if (msg.badges.includes('broadcaster')) badgeIcons += '<i class="fas fa-star" style="color:#e91e63;font-size:0.7rem;margin-right:2px" title="Broadcaster"></i>';
            if (msg.badges.includes('moderator')) badgeIcons += '<i class="fas fa-shield-alt" style="color:#00b894;font-size:0.7rem;margin-right:2px" title="Mod"></i>';
            if (msg.badges.includes('vip')) badgeIcons += '<i class="fas fa-gem" style="color:#e040fb;font-size:0.7rem;margin-right:2px" title="VIP"></i>';
            if (msg.badges.includes('subscriber')) badgeIcons += '<i class="fas fa-heart" style="color:#e91e63;font-size:0.7rem;margin-right:2px" title="Sub"></i>';

            el.innerHTML = `${badgeIcons}<span class="chat-author"></span>: <span class="chat-text"></span>`;
            const authorEl = el.querySelector('.chat-author');
            const textEl = el.querySelector('.chat-text');
            // Set color via DOM property (safe) rather than interpolating into a style attribute.
            // Validate to a hex color to avoid CSS-level injection from a manipulated chat payload.
            if (typeof msg.color === 'string' && /^#[0-9a-fA-F]{3,8}$/.test(msg.color)) {
                authorEl.style.color = msg.color;
            }
            authorEl.textContent = msg.author;
            textEl.textContent = msg.text;

            chatMessages.appendChild(el);
            if (overlayChatMessages) {
                overlayChatMessages.appendChild(el.cloneNode(true));
                // Auto-scroll overlay
                overlayChatMessages.scrollTop = overlayChatMessages.scrollHeight;
            }

            // Keep max 200 messages
            while (chatMessages.children.length > 200) chatMessages.firstChild.remove();
            if (overlayChatMessages) {
                while (overlayChatMessages.children.length > 200) overlayChatMessages.firstChild.remove();
            }

            // Auto-scroll
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── Send Chat Message via API ──
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !twitchUser || !channelId) return;

            const sendBtn = document.getElementById('chatSendBtn');
            sendBtn.disabled = true;
            input.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/twitch/chat/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ message, channel_id: channelId })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    console.error('Chat send error:', err.message || res.statusText);
                }

                input.value = '';
            } catch (err) {
                console.error('Chat send error:', err);
            } finally {
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        // ── Stream Info (viewer count, channel ID) ──
        async function fetchStreamInfo() {
            try {
                const res = await fetch(`${API_BASE}/twitch/stream/${CHANNEL}`);
                if (!res.ok) return;
                const data = await res.json();

                if (data.channel) channelId = data.channel.id;

                const viewerCountEl = document.getElementById('viewerCount');
                if (viewerCountEl) viewerCountEl.textContent = data.live ? data.viewer_count : 0;
            } catch (err) {
                console.error('Stream info error:', err);
            }
        }

        // ── Extensions ──
        const EMOTES = ['🎮', '💖', '✨', '🔥', '🎉', '🌸', '💜', '🥒', '⭐', '🎵'];

        function triggerEmoteRain() {
            const container = document.getElementById('emoteRain');
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    const emote = document.createElement('div');
                    emote.className = 'rain-emote';
                    emote.textContent = EMOTES[secureRandomInt(EMOTES.length)];
                    emote.style.left = secureRandomFloat() * 100 + '%';
                    emote.style.animationDuration = (2 + secureRandomFloat() * 2) + 's';
                    container.appendChild(emote);
                    setTimeout(() => emote.remove(), 5000);
                }, i * 80);
            }
        }

        function toggleViewerOverlay() {
            const overlay = document.getElementById('viewerOverlay');
            overlay.classList.toggle('show');
        }

        function togglePollOverlay() {
            const overlay = document.getElementById('pollOverlay');
            overlay.classList.toggle('show');
            if (overlay.classList.contains('show')) renderPoll();
        }

        const pollData = {
            question: 'Bestes Spiel?',
            options: [
                { label: 'Valorant', votes: 0 },
                { label: 'Minecraft', votes: 0 },
                { label: 'Fortnite', votes: 0 },
                { label: 'LoL', votes: 0 }
            ]
        };

        function renderPoll() {
            const container = document.getElementById('pollOptions');
            const totalVotes = pollData.options.reduce((sum, o) => sum + o.votes, 0) || 1;
            container.innerHTML = pollData.options.map((opt, i) => `
                <div class="poll-option" onclick="votePoll(${i})">
                    <div class="poll-option-label">
                        <span>${escapeHtml(opt.label)}</span>
                        <span>${opt.votes} (${Math.round(opt.votes / totalVotes * 100)}%)</span>
                    </div>
                    <div class="poll-option-bar">
                        <div class="poll-option-fill" style="width:${opt.votes / totalVotes * 100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function votePoll(index) {
            pollData.options[index].votes++;
            renderPoll();
        }

        // ── Sparkles ──
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.97) {
                createSparkle(e.clientX, e.clientY);
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.style.cssText = `
                position: fixed;
                left: ${x}px;
                top: ${y}px;
                width: 8px;
                height: 8px;
                background: linear-gradient(135deg, #FFA8C2, #FF6B9D);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                animation: sparkleAnim 1s ease forwards;
            `;
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        }

        // ── Cinema Mode + Overlay Chat ──
        const cinemaToggle = document.getElementById('cinemaToggle');
        const overlayChat = document.getElementById('overlayChat');
        const cornerIndicators = document.querySelectorAll('.corner-indicator');
        let currentPosition = 'bottom-right';

        cinemaToggle.addEventListener('click', () => {
            document.body.classList.toggle('cinema-mode');
            cinemaToggle.classList.toggle('active');
        });

        cornerIndicators.forEach(indicator => {
            indicator.addEventListener('click', () => {
                const newPosition = indicator.dataset.position;
                cornerIndicators.forEach(ind => { ind.classList.remove('active', 'hidden'); });
                indicator.classList.add('hidden');
                overlayChat.classList.remove('top-left', 'top-right', 'bottom-left', 'bottom-right');
                overlayChat.classList.add(newPosition);
                currentPosition = newPosition;
            });
        });

        document.querySelector('.corner-indicator.bottom-right').classList.add('hidden');

        const overlayChatClose = document.getElementById('overlayChatClose');
        const chatToggleHeader = document.getElementById('chatToggleHeader');

        overlayChatClose.addEventListener('click', () => {
            overlayChat.classList.add('hidden-chat');
            chatToggleHeader.classList.add('visible');
            document.body.classList.add('chat-hidden');
        });

        chatToggleHeader.addEventListener('click', () => {
            overlayChat.classList.remove('hidden-chat');
            chatToggleHeader.classList.remove('visible');
            document.body.classList.remove('chat-hidden');
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'f' || e.key === 'F' || e.key === 'k' || e.key === 'K') {
                document.body.classList.toggle('cinema-mode');
                cinemaToggle.classList.toggle('active');
            }
        });

        // ── Easter Egg ──
        const easterEgg1 = document.getElementById('easter-egg-1');
        easterEgg1.addEventListener('click', () => {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const cucumber = document.createElement('div');
                    const x = Math.random() * window.innerWidth;
                    const duration = 2 + Math.random() * 1;
                    cucumber.textContent = '🥒';
                    cucumber.style.cssText = `
                        position: fixed; left: ${x}px; top: -50px; font-size: 2rem;
                        pointer-events: none; z-index: 9999;
                        animation: fall ${duration}s linear forwards;
                    `;
                    document.body.appendChild(cucumber);
                    setTimeout(() => cucumber.remove(), duration * 1000);
                }, i * 50);
            }
        });

        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall { to { transform: translateY(${window.innerHeight + 100}px) rotate(360deg); opacity: 0; } }
        `;
        document.head.appendChild(style);

        // ── Event Listeners ──
        document.getElementById('twitchLoginBtn').addEventListener('click', () => {
            if (twitchUser) { twitchLogout(); } else { startTwitchLogin(); }
        });
        document.getElementById('chatTwitchLogin').addEventListener('click', startTwitchLogin);
        document.getElementById('chatLogout').addEventListener('click', twitchLogout);
        document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        // Extension buttons
        document.getElementById('extEmoteRain').addEventListener('click', triggerEmoteRain);
        document.getElementById('extViewers').addEventListener('click', toggleViewerOverlay);
        document.getElementById('extPoll').addEventListener('click', togglePollOverlay);

        // ── Init ──
        handleOAuthCallback();
        updateAuthUI();
        connectChat();
        fetchStreamInfo();
        setInterval(fetchStreamInfo, 60000);

        console.log("|--------------------------------------------------------------------------------------------------------------------|")
        console.log("|                                                                                                                    |")
        console.log("|  Na, neugierig? Du willst auch dran arbeiten? Hilf mir doch :) https://github.com/3roiler/web/blob/main/sasu.html  |")
        console.log("|                                                                                                                    |"  )
        console.log("|--------------------------------------------------------------------------------------------------------------------|")
    </script>
</body>
